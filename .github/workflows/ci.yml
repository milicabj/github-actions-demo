name: CI/CD Demo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Preuzimanje koda
        uses: actions/checkout@v4

      - name: Podešavanje Node.js okruženja
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalacija zavisnosti
        run: npm install

      - name: Pokretanje testova
        run: npm test

      - name: Simulacija CD faze
        if: success()
        run: echo "Deployment step executed after successful tests."