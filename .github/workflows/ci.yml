name: CI Demo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Preuzimanje koda
        uses: actions/checkout@v4

      - name: Podešavanje Node.js okruženja
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalacija zavisnosti
        run: npm install

      - name: Pokretanje testova
        run: npm test